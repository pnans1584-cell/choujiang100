<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>群内实时投票</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; border-radius: 16px; padding: 24px; width: 100%; max-width: 380px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #1a1a1a; margin-bottom: 25px; }
        .option { position: relative; margin-bottom: 12px; padding: 16px; border: 1.5px solid #eef0f2; border-radius: 12px; cursor: pointer; transition: all 0.2s; overflow: hidden; }
        .option:active { transform: scale(0.98); }
        .progress-bar { position: absolute; left: 0; top: 0; height: 100%; background: #07c160; opacity: 0.15; transition: width 0.6s cubic-bezier(0.1, 0, 0, 1); z-index: 0; }
        .content { position: relative; z-index: 1; display: flex; justify-content: space-between; font-weight: 600; font-size: 15px; color: #333; }
        .voted { border-color: #07c160; background: #fafffb; pointer-events: none; }
        .status { font-size: 12px; color: #a0a0a0; text-align: center; margin-top: 20px; }
        #error-msg { color: #e74c3c; font-size: 12px; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="voteTitle">📊 正在进行的投票</h2>
    <div id="optionsBox">⏳ 正在同步云端数据...</div>
    <div id="error-msg"></div>
    <p class="status" id="statusText">结果每 5 秒自动更新</p>
</div>

<script>
    // --- 2. 配置区（请确保这里填写正确） ---
    const S_URL = 'https://pcguqrxeokmyjyommnan.supabase.co'; // 结尾不要带斜杠
    const S_KEY = 'sb_publishable_QjoSdYWcYNvVIOpUXQda4w_G3uLan3x'; 

    // --- 3. 核心逻辑（已修正命名冲突） ---
    // 使用 supabase.createClient 而不是自定义变量名 supabase
    const _client = supabase.createClient(S_URL, S_KEY);
    const STORAGE_KEY = 'group_vote_done_v1';

    async function fetchVotes() {
        try {
            const { data, error } = await _client
                .from('vote_items')
                .select('*')
                .order('id', { ascending: true });
            
            if (error) throw error;
            
            if (!data || data.length === 0) {
                document.getElementById('optionsBox').innerText = "暂无投票选项，请检查数据库";
                return;
            }

            render(data);
            document.getElementById('error-msg').style.display = 'none';
        } catch (err) {
            console.error(err);
            document.getElementById('error-msg').innerText = "同步失败: " + err.message;
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    function render(list) {
        const box = document.getElementById('optionsBox');
        box.innerHTML = '';
        const votedId = localStorage.getItem(STORAGE_KEY);
        const total = list.reduce((s, i) => s + i.count, 0);

        list.forEach(item => {
            const percent = total === 0 ? 0 : Math.round((item.count / total) * 100);
            const el = document.createElement('div');
            el.className = `option ${votedId == item.id ? 'voted' : ''}`;
            el.onclick = () => doVote(item.id, item.count);
            el.innerHTML = `
                <div class="progress-bar" style="width: ${percent}%"></div>
                <div class="content">
                    <span>${item.name}</span>
                    <span>${item.count} 票 (${percent}%)</span>
                </div>
            `;
            box.appendChild(el);
        });

        if (votedId) document.getElementById('statusText').innerText = "✅ 你已投过票";
    }

    async function doVote(id, currentCount) {
        if (localStorage.getItem(STORAGE_KEY)) return;

        // 锁定本地，防止重复点
        localStorage.setItem(STORAGE_KEY, id);
        
        const { error } = await _client
            .from('vote_items')
            .update({ count: currentCount + 1 })
            .eq('id', id);

        if (error) {
            alert("投票失败: " + error.message);
            localStorage.removeItem(STORAGE_KEY);
        } else {
            fetchVotes(); // 立即刷新界面
        }
    }

    // 初始加载
    fetchVotes();
    // 实时同步刷新
    setInterval(fetchVotes, 5000);
</script>
</body>
</html>
