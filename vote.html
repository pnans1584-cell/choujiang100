<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>群内实时投票</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; border-radius: 16px; padding: 24px; width: 100%; max-width: 380px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #1a1a1a; margin-bottom: 25px; }
        .option { position: relative; margin-bottom: 12px; padding: 16px; border: 1.5px solid #eef0f2; border-radius: 12px; cursor: pointer; transition: all 0.2s; overflow: hidden; }
        .option:active { transform: scale(0.98); }
        .progress-bar { position: absolute; left: 0; top: 0; height: 100%; background: #07c160; opacity: 0.15; transition: width 0.6s cubic-bezier(0.1, 0, 0, 1); z-index: 0; }
        .content { position: relative; z-index: 1; display: flex; justify-content: space-between; font-weight: 600; font-size: 15px; color: #333; }
        .voted { border-color: #07c160; background: #fafffb; pointer-events: none; }
        .status { font-size: 12px; color: #a0a0a0; text-align: center; margin-top: 20px; }
        #error-msg { color: #e74c3c; font-size: 12px; text-align: center; margin-top: 10px; display: none; padding: 10px; background: #fdeaea; border-radius: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="voteTitle">📊 实时投票调查</h2>
    <div id="optionsBox" style="text-align: center; color: #666;">⏳ 正在连接云端数据库...</div>
    <div id="error-msg"></div>
    <p class="status" id="statusText">每 5 秒自动同步最新结果</p>
</div>

<script>
    // --- 1. 配置区（务必确保这里填写正确） ---
    const S_URL = 'https://pcguqrxeokmyjyommnan.supabase.co'; 
    const S_KEY = 'sb_publishable_QjoSdYWcYNvVIOpUXQda4w_G3uLan3x'; 

    // --- 2. 核心初始化（修正变量名冲突） ---
    // 我们将变量名改为 _supabase 以避开 SDK 自带的 supabase 全局对象
    const _supabase = supabase.createClient(S_URL, S_KEY);
    const STORAGE_KEY = 'group_vote_v1';

    async function fetchVotes() {
        try {
            const { data, error } = await _supabase
                .from('vote_items')
                .select('*')
                .order('id', { ascending: true });
            
            if (error) throw error;
            
            if (!data || data.length === 0) {
                document.getElementById('optionsBox').innerText = "数据库里没有找到选项，请检查表名";
                return;
            }

            render(data);
            document.getElementById('error-msg').style.display = 'none';
        } catch (err) {
            console.error("加载失败:", err);
            const errDiv = document.getElementById('error-msg');
            errDiv.innerText = "⚠️ 连接失败: " + err.message;
            errDiv.style.display = 'block';
        }
    }

    function render(list) {
        const box = document.getElementById('optionsBox');
        box.innerHTML = '';
        const votedId = localStorage.getItem(STORAGE_KEY);
        const total = list.reduce((s, i) => s + (i.count || 0), 0);

        list.forEach(item => {
            const count = item.count || 0;
            const percent = total === 0 ? 0 : Math.round((count / total) * 100);
            
            const el = document.createElement('div');
            el.className = `option ${votedId == item.id ? 'voted' : ''}`;
            el.onclick = () => doVote(item.id, count);
            
            el.innerHTML = `
                <div class="progress-bar" style="width: ${percent}%"></div>
                <div class="content">
                    <span>${item.name}</span>
                    <span>${count} 票 (${percent}%)</span>
                </div>
            `;
            box.appendChild(el);
        });

        if (votedId) document.getElementById('statusText').innerText = "✅ 你已投过票，结果实时更新中";
    }

    async function doVote(id, currentCount) {
        if (localStorage.getItem(STORAGE_KEY)) return;

        // 本地预锁定
        localStorage.setItem(STORAGE_KEY, id);
        
        const { error } = await _supabase
            .from('vote_items')
            .update({ count: currentCount + 1 })
            .eq('id', id);

        if (error) {
            alert("投票失败: " + error.message);
            localStorage.removeItem(STORAGE_KEY);
        } else {
            fetchVotes(); // 成功后立即拉取新数据
        }
    }

    // 初始启动
    fetchVotes();
    // 开启自动刷新
    setInterval(fetchVotes, 5000);
</script>
</body>
</html>
