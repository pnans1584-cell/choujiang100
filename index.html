<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>限时限量砸金蛋</title>
    <style>
        body { margin: 0; background: #c0392b; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: white; }
        .header { margin-top: 50px; text-align: center; }
        .egg-container { display: flex; justify-content: center; gap: 20px; margin-top: 60px; }
        .egg-item { width: 100px; height: 130px; cursor: pointer; position: relative; }
        .egg { 
            width: 100%; height: 100%; 
            background: radial-gradient(circle at 30% 30%, #ffdf88, #f1c40f 60%, #d4ac0d);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; font-weight: bold; color: #d4ac0d;
        }
        .egg.broken { background: #95a5a6; opacity: 0.6; transform: scale(0.9); pointer-events: none; }
        .status-msg { margin-top: 40px; font-size: 1.1rem; background: rgba(0,0,0,0.2); padding: 10px 20px; border-radius: 20px; }
        
        /* 弹窗样式 */
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                 background: white; color: #333; padding: 30px; border-radius: 15px; text-align: center; z-index: 100; width: 250px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 99; }
        h2 { color: #e74c3c; margin-top: 0; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎁 限量优惠券抽取</h1>
        <p>全群仅一份，看谁手气快！</p>
    </div>

    <div class="egg-container">
        <div class="egg-item" onclick="handleDraw(this)"><div class="egg">1</div></div>
        <div class="egg-item" onclick="handleDraw(this)"><div class="egg">2</div></div>
        <div class="egg-item" onclick="handleDraw(this)"><div class="egg">3</div></div>
    </div>

    <div class="status-msg" id="statusText">请选择一个金蛋</div>

    <div class="overlay" id="overlay"></div>
    <div id="modal">
        <h2 id="resultTitle">结果</h2>
        <p id="resultDesc"></p>
        <button onclick="closeModal()" style="padding: 8px 20px; cursor:pointer;">确定</button>
    </div>

    <script>
        const WIN_RATE = 0.05; // 5% 中奖率
        const STORAGE_KEY = 'my_lottery_user_played';

        function handleDraw(element) {
            // 1. 检查当前设备是否已经抽过奖
            if (localStorage.getItem(STORAGE_KEY)) {
                alert("您已经参加过抽奖啦，每人限抽一次哦！");
                return;
            }

            const egg = element.querySelector('.egg');
            egg.innerHTML = "💥";
            egg.classList.add('broken');

            // 标记已抽奖
            localStorage.setItem(STORAGE_KEY, 'true');

            // 2. 核心逻辑：即抽即中
            // 产生一个 0-1 之间的随机数，如果小于 0.05 则中奖
            const isWinner = Math.random() < WIN_RATE;

            if (isWinner) {
                showResult("恭喜中奖！", "🎉 您获得了一张优惠券！");
                document.getElementById('statusText').innerText = "奖品已被领走，活动结束";
                // 这里可以额外逻辑：比如一旦中奖，在控制台打印一个核销码
            } else {
                showResult("很遗憾", "💨 谢谢参与，下次好运！");
                document.getElementById('statusText').innerText = "哎呀，没中奖，换个人试试？";
            }
        }

        function showResult(title, desc) {
            document.getElementById('resultTitle').innerText = title;
            document.getElementById('resultDesc').innerText = desc;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('modal').style.display = 'none';
        }

        // 初始化检查
        window.onload = function() {
            if (localStorage.getItem(STORAGE_KEY)) {
                document.getElementById('statusText').innerText = "您已完成抽奖";
            }
        }
    </script>
</body>
</html>
